<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#05070a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#47bfff"/>
      <stop offset="100%" stop-color="#0d1220" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#47bfff"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#7e14ff" stroke-width="1.2" opacity="0.55"/>

  <g fill="none" stroke="url(#ringGrad)" stroke-linecap="round">
    <circle cx="50" cy="50" r="38" stroke-width="2.2" stroke-dasharray="14 6 4 6" opacity="0.9"/>
    <circle cx="50" cy="50" r="29" stroke-width="2.6" stroke-dasharray="10 5" opacity="0.95" transform="rotate(35 50 50)"/>
  </g>

  <circle cx="50" cy="50" r="19" fill="none" stroke="#e8e6f0" stroke-width="1.5" opacity="0.85"/>
  <circle cx="50" cy="50" r="14" fill="url(#core)"/>
  <circle cx="50" cy="50" r="6.5" fill="#ffffff"/>

  <g stroke="#47bfff" stroke-width="2" opacity="0.9">
    <line x1="50" y1="4" x2="50" y2="12"/>
    <line x1="50" y1="88" x2="50" y2="96"/>
    <line x1="4" y1="50" x2="12" y2="50"/>
    <line x1="88" y1="50" x2="96" y2="50"/>
  </g>
</svg>
